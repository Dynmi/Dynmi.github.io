---
layout: default
---

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.css">
<script src="https://unpkg.com/gitalk/dist/gitalk.min.js"></script>

<div class="post">

  <!-- mathjax -->
  {% if page.mathjax %}
  <script type="text/x-mathjax-config">
    MathJax.Hub.Config({
      TeX: {
        equationNumbers: {
          autoNumber: "AMS"
        }
      },
      SVG: {
        scale: 90
      },
      tex2jax: {
        inlineMath: [ ['$','$'] ],
        displayMath: [ ['$$','$$'] ],
        processEscapes: true,
      }
    });
  </script>
  <script type="text/javascript" src="//cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS-MML_HTMLorMML"></script>
  {% endif %}

  <!-- mermaid -->
  {% if page.mermaid %}
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    // Rouge wraps a ```mermaid fence in div.language-mermaid; the second
    // selector covers a build with highlighting off. Unwrap either to the bare
    // source before mermaid parses it.
    document.querySelectorAll('div.language-mermaid, pre > code.language-mermaid').forEach(function (node) {
      var block = node.tagName === 'CODE' ? node.parentNode : node;
      var host = document.createElement('div');
      host.className = 'mermaid';
      host.textContent = block.textContent.trim();
      block.parentNode.replaceChild(host, block);
    });

    // Render at natural size and let .mermaid scroll horizontally: several
    // diagrams here are ~1700-2500px wide and scaling them into the 800px
    // column shrinks the labels past legibility.
    var wide = { useMaxWidth: false };
    mermaid.initialize({
      startOnLoad: true,
      theme: 'neutral',
      securityLevel: 'strict',
      flowchart: wide,
      sequence: wide,
      timeline: wide,
      mindmap: wide,
      quadrantChart: wide
    });
  </script>
  {% endif %}

  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="meta">{{ page.date | date: "%b %-d, %Y" }}{% if page.author %} • {{ page.author }}{% endif %}{% if page.meta %} • {{ page.meta }}{% endif %}</p>
  </header>

  <article class="post-content">
  {{ content }}
  </article>

  <!-- gitment comments -->
  <div>
    {% if page.comments %}
    <div id="gitalk_container"></div>
    <script>
     const gitalk = new Gitalk({
       clientID: 'b47f56c253316613f70e',
       clientSecret: '94ddc703708b8b274c3fbb2156385d149bf3ecb2',
       owner: 'Dynmi',
       repo: 'Dynmi.github.io',
       admin: ['Dynmi'],
       id: location.pathname,      // Ensure uniqueness and length less than 50
       distractionFreeMode: false  // Facebook-like distraction free mode
     })
     gitalk.render('gitalk_container')
    </script>
    {% endif %}
  </div>

</div>
